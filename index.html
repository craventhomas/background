<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Polycom Background</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      color: #172033;
    }

    main {
      width: min(92vw, 760px);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid #d7deea;
    }

    a {
      color: #175cd3;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <h1>Polycom Background</h1>
    <p><a href="e450bg4.png">Direct image URL</a></p>
    <img src="e450bg4.png" alt="Polycom background">
  </main>
</body>
</html>
